services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: devpunks
      POSTGRES_USER: devpunks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  backend:
    build: ./backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://devpunks:${POSTGRES_PASSWORD}@postgres:5432/devpunks
      QDRANT_HOST: qdrant
    depends_on:
      - postgres
      - qdrant
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
